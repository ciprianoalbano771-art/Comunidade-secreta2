<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a0a14 0%, #2a0f1f 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; margin: 0;">

  <div style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(236, 72, 153, 0.2); border-radius: 24px; padding: 40px 32px; max-width: 460px; width: 100%; text-align: center; backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);">

    <!-- Avatar da Lukie -->
    <div style="display: block; margin: 0 auto 20px; position: relative; width: 96px; height: 96px;">
      <div id="avatarCircle" style="width: 96px; height: 96px; background: linear-gradient(135deg, #ec4899, #a855f7); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(236, 72, 153, 0.3); overflow: hidden; border: 3px solid rgba(255,255,255,0.1);">
        <img id="avatarImg" src="perfil lukie/FB.jpg" alt="Lukie" style="width: 100%; height: 100%; object-fit: cover;" />
      </div>
    </div>

    <div style="display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px;">
      <div style="display: inline-flex; align-items: center; gap: 8px; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); border-radius: 100px; padding: 6px 14px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span style="color: #22c55e; font-size: 12px; font-weight: 600;">Pagamento aprovado</span>
      </div>
      <div style="display: inline-flex; align-items: center; gap: 8px; background: rgba(236, 72, 153, 0.1); border: 1px solid rgba(236, 72, 153, 0.3); border-radius: 100px; padding: 6px 14px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        <span style="color: #ec4899; font-size: 12px; font-weight: 600;">Aprovação pendente</span>
      </div>
    </div>

    <h1 style="color: #ffffff; font-size: 24px; font-weight: 700; margin: 0 0 10px; letter-spacing: -0.5px;">
      Aguarde a aprovação da Lukie
    </h1>

    <p style="color: rgba(255, 255, 255, 0.65); font-size: 14px; line-height: 1.6; margin: 0 0 24px;">
      O seu pagamento foi recebido com sucesso. A Lukie está a aprovar manualmente o seu acesso ao grupo privado.
    </p>

    <!-- Loader -->
    <div style="position: relative; width: 64px; height: 64px; margin: 0 auto 24px;">
      <div style="position: absolute; inset: 0; border: 3px solid rgba(236, 72, 153, 0.15); border-radius: 50%;"></div>
      <div style="position: absolute; inset: 0; border: 3px solid transparent; border-top-color: #ec4899; border-right-color: #ec4899; border-radius: 50%; animation: spin 1.2s linear infinite;"></div>
    </div>

    <div style="background: rgba(236, 72, 153, 0.06); border: 1px solid rgba(236, 72, 153, 0.2); border-radius: 14px; padding: 14px 16px; margin-bottom: 28px; text-align: left;">
      <div style="display: flex; align-items: center; gap: 10px;">
        <div style="width: 8px; height: 8px; background: #ec4899; border-radius: 50%; animation: pulse 2s ease-in-out infinite; flex-shrink: 0;"></div>
        <span style="color: #ffffff; font-size: 13px; font-weight: 600;">Aguardando aprovação...</span>
      </div>
    </div>

    <!-- Feed de aprovações -->
    <div style="text-align: left; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 20px;">
      <div id="feed" style="display: flex; flex-direction: column; gap: 10px; max-height: 240px; overflow: hidden; position: relative;">
        <!-- comentários inseridos via JS -->
      </div>
    </div>

    <p style="color: rgba(255, 255, 255, 0.35); font-size: 11px; margin: 20px 0 0; line-height: 1.5;">
      ⏱️ Tempo médio: 5 a 30 minutos · Não feche esta página
    </p>

  </div>

  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.3); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .feed-item {
      animation: slideIn 0.4s ease-out;
    }
  </style>

  <script>
    // Nomes moçambicanos para feed fake
    const nomes = [
      'José', 'Nhatumbe', 'Carlos', 'Manuel', 'Pedro Macuácua', 'António',
      'Mussa', 'Issufo', 'Fernando', 'Aníbal', 'Rachide', 'Mário Sitoe',
      'Hélder', 'Tomás', 'Custódio', 'Bento', 'Armando', 'Eduardo Cossa',
      'Nelson', 'Júlio', 'Ricardo', 'Bruno Macamo', 'Felipe', 'Jaime',
      'Salimo', 'Adriano', 'Rogério', 'Ivan Mucavele', 'Hélio', 'Dércio'
    ];

    // Gera URL de avatar realista do DiceBear (estilo "personas" / "avataaars")
    function getAvatarUrl(nome) {
      const seed = encodeURIComponent(nome + Math.floor(Math.random() * 1000));
      return `https://api.dicebear.com/7.x/avataaars/svg?seed=${seed}&backgroundColor=ec4899,a855f7,3b82f6,f59e0b,22c55e,8b5cf6,f97316`;
    }

    const tempos = ['agora', 'há 1 min', 'há 2 min', 'há 3 min', 'há 5 min', 'há 7 min'];
    const cores = [
      ['#ec4899', '#a855f7'],
      ['#3b82f6', '#06b6d4'],
      ['#f59e0b', '#ef4444'],
      ['#22c55e', '#14b8a6'],
      ['#8b5cf6', '#ec4899'],
      ['#f97316', '#eab308']
    ];

    // Mapa de fotos reais por nome
    const fotosReais = {
      'José': 'fotos/jose.jpg',
      'Nhatumbe': 'fotos/Nhatumbe.jpg',
      'Carlos': 'fotos/Carlos.jpg',
      'António': 'fotos/Antonio.jpg',
      'Issufo': 'fotos/Issufo.jpg',
      'Fernando': 'fotos/Fernando.jpg',
      'Aníbal': 'fotos/Anibal.jpg',
      'Rachide': 'fotos/Rachide.jpg',
      'Mário Sitoe': 'fotos/Mario sitoe.jpg',
      'Hélder': 'fotos/Helder.jpg',
      'Tomás': 'fotos/Tomas.jpg',
      'Custódio': 'fotos/Custodio.jpg',
      'Bento': 'fotos/Bento.jpg',
      'Armando': 'fotos/Armando.jpg',
      'Nelson': 'fotos/Nelson.jpg',
      'Júlio': 'fotos/Julio.jpg',
      'Ricardo': 'fotos/Ricardo.jpg',
      'Bruno Macamo': 'fotos/Bruno macamo.jpg',
      'Felipe': 'fotos/Felipe.jpg',
      'Jaime': 'fotos/Jaime.jpg',
      'Salimo': 'fotos/Salimo.jpg',
      'Adriano': 'fotos/Adriano.jpg',
      'Rogério': 'fotos/Rogério.jpg',
      'Ivan Mucavele': 'fotos/Ivan mucavele.jpg',
      'Hélio': 'fotos/Helio.jpg'
    };

    const feed = document.getElementById('feed');
    const usadosRecentes = [];

    function getNomeAleatorio() {
      let nome;
      do {
        nome = nomes[Math.floor(Math.random() * nomes.length)];
      } while (usadosRecentes.includes(nome));
      usadosRecentes.push(nome);
      if (usadosRecentes.length > 8) usadosRecentes.shift();
      return nome;
    }

    function criarItem(nome, tempo) {
      const cor = cores[Math.floor(Math.random() * cores.length)];
      const inicial = nome.charAt(0).toUpperCase();
      const fotoReal = fotosReais[nome];
      const avatarHtml = fotoReal
        ? `<div style="width: 32px; height: 32px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.1);">
            <img src="${fotoReal}" alt="${nome}" style="width: 100%; height: 100%; object-fit: cover;" />
          </div>`
        : `<div style="width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, ${cor[0]}, ${cor[1]}); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 700; flex-shrink: 0;">
            ${inicial}
          </div>`;
      const div = document.createElement('div');
      div.className = 'feed-item';
      div.style.cssText = 'display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05);';
      div.innerHTML = `
        ${avatarHtml}
        <div style="flex: 1; min-width: 0;">
          <p style="color: #fff; font-size: 13px; margin: 0; line-height: 1.3;">
            Lukie aprovou <strong style="color: #ec4899;">${nome}</strong>
          </p>
          <p style="color: rgba(255,255,255,0.4); font-size: 11px; margin: 2px 0 0;">${tempo}</p>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      `;
      return div;
    }

    // Popular feed inicial
    function popularInicial() {
      const iniciais = [
        { nome: 'José', tempo: 'agora' },
        { nome: 'Nhatumbe', tempo: 'há 1 min' },
        { nome: 'Carlos', tempo: 'há 2 min' },
        { nome: 'Mussa', tempo: 'há 4 min' }
      ];
      iniciais.forEach(({ nome, tempo }) => {
        feed.appendChild(criarItem(nome, tempo));
        usadosRecentes.push(nome);
      });
    }
    popularInicial();

    // Adicionar novo a cada X segundos
    function adicionarNovo() {
      const nome = getNomeAleatorio();
      const novoItem = criarItem(nome, 'agora');
      feed.insertBefore(novoItem, feed.firstChild);

      // Atualizar tempos dos antigos
      const items = feed.querySelectorAll('.feed-item');
      items.forEach((item, idx) => {
        const tempoEl = item.querySelector('p:nth-child(2)');
        if (tempoEl && idx > 0) {
          const tempoTexto = tempos[Math.min(idx, tempos.length - 1)];
          tempoEl.textContent = tempoTexto;
        }
      });

      // Remover excedentes
      while (feed.children.length > 5) {
        feed.removeChild(feed.lastChild);
      }
    }

    setInterval(adicionarNovo, 4500 + Math.random() * 3000);
  </script>

</div>
